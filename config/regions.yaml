# Region detection patterns (Python regex, case-insensitive)
# IP prefix patterns auto-detect region when a device IP appears in the message.

ap:
  patterns:
    - "\\b(ap|apac|asia.pacific|singapore|sg|sydney|australia|tokyo|japan|mumbai|mum|mum-dc)\\b"
    - "\\b(ap[-_]?(south|southeast|east|dc|datacenter|region))\\b"
    - "\\b10\\.151\\.\\d{1,3}\\.\\d{1,3}\\b"   # 10.151.x.x -> AP-South-1 (mum-dc)
  display_name: "AP-South-1 (mum-dc)"
  timezone: "Asia/Kolkata"
  ip_prefix: "10.151"

dublin:
  patterns:
    - "\\b(dublin|ireland|eu|europe|european|eu-dc)\\b"
    - "\\b(eu[-_]?(west|dc|datacenter|region))\\b"
    - "\\b(ire|euw)\\b"
    - "\\b10\\.100\\.\\d{1,3}\\.\\d{1,3}\\b"   # 10.100.x.x -> EU-West-1 (eu-dc)
  display_name: "EU-West-1 (eu-dc)"
  timezone: "Europe/Dublin"
  ip_prefix: "10.100"

us:
  patterns:
    - "\\b(us|usa|united.states|america|lw.expansion|us-west)\\b"
    - "\\b(us[-_]?(east|west|central|dc|datacenter|region))\\b"
    - "\\b(virginia|california|ohio|oregon|seattle)\\b"
    - "\\b10\\.146\\.\\d{1,3}\\.\\d{1,3}\\b"   # 10.146.x.x -> US-West-1
  display_name: "US-West-1"
  timezone: "America/Los_Angeles"
  ip_prefix: "10.146"

india:
  patterns:
    - "\\b(india|ind|blr|bangalore|bengaluru|hyderabad|hyd)\\b"
    - "\\b(india[-_]?(dc|datacenter|region))\\b"
    - "\\b(in[-_]?(dc|region|cluster))\\b"
  display_name: "India"
  timezone: "Asia/Kolkata"
  ip_prefix: ""
